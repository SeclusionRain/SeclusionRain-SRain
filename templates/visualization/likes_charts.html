{% extends "base.html" %}

{% block title %}点赞量情感分析 - 抖音美妆视频评论情感分析系统{% endblock %}

{% block content %}
<div class="container-fluid px-4 py-6">
    <!-- 页面标题和返回按钮 -->
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 animate-fade-in">
        <h2 class="text-2xl font-bold text-gray-800 mb-4 md:mb-0">
            <i class="fas fa-heart text-red-500 me-2"></i>点赞量情感倾向分析
        </h2>
        <a href="{{ url_for('visualization.view_charts', history_id=history.id) }}" 
           class="bg-indigo-100 hover:bg-indigo-200 text-indigo-700 px-4 py-2 rounded-lg transition-all duration-300 flex items-center shadow-sm hover:shadow">
            <i class="fas fa-arrow-left mr-1"></i>返回仪表板
        </a>
    </div>

    <!-- 图表区域 - 使用 Tailwind 的 grid 布局 -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
        <!-- 1. 点赞量分层情感分布饼图 -->
        <div class="rounded-xl shadow-lg overflow-hidden bg-white hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1 animate-slide-in-right">
            <div class="bg-gradient-to-r from-blue-500 to-blue-600 px-6 py-3">
                <div class="flex justify-between items-center">
                    <h5 class="text-white font-medium flex items-center">
                        <i class="fas fa-chart-pie me-2"></i>点赞量分层情感分布
                    </h5>
                    <button class="export-btn bg-white/20 hover:bg-white/30 text-white px-3 py-1 rounded-lg transition-all duration-300 text-sm" data-chart="tierPieChart">
                        <i class="fas fa-download"></i>
                    </button>
                </div>
            </div>
            <div class="p-4">
                <div id="likesTierPieChart" style="height: 400px;"></div>
            </div>
        </div>

        <!-- 2. 点赞量层级对比柱状图 -->
        <div class="rounded-xl shadow-lg overflow-hidden bg-white hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1 animate-slide-in-left">
            <div class="bg-gradient-to-r from-blue-400 to-blue-500 px-6 py-3">
                <div class="flex justify-between items-center">
                    <h5 class="text-white font-medium flex items-center">
                        <i class="fas fa-chart-bar me-2"></i>各层级情感对比
                    </h5>
                    <button class="export-btn bg-white/20 hover:bg-white/30 text-white px-3 py-1 rounded-lg transition-all duration-300 text-sm" data-chart="tierBarChart">
                        <i class="fas fa-download"></i>
                    </button>
                </div>
            </div>
            <div class="p-4">
                <div id="likesTierBarChart" style="height: 400px;"></div>
            </div>
        </div>

        <!-- 3. 点赞量与情感散点图 -->
        <div class="rounded-xl shadow-lg overflow-hidden bg-white hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1 animate-slide-in-right">
            <div class="bg-gradient-to-r from-yellow-400 to-yellow-500 px-6 py-3">
                <div class="flex justify-between items-center">
                    <h5 class="text-white font-medium flex items-center">
                        <i class="fas fa-braille me-2"></i>点赞量情感散点分布
                    </h5>
                    <button class="export-btn bg-white/20 hover:bg-white/30 text-white px-3 py-1 rounded-lg transition-all duration-300 text-sm" data-chart="scatterChart">
                        <i class="fas fa-download"></i>
                    </button>
                </div>
            </div>
            <div class="p-4">
                <div id="likesScatterChart" style="height: 400px;"></div>
            </div>
        </div>

        <!-- 4. 点赞量情感趋势面积图 -->
        <div class="rounded-xl shadow-lg overflow-hidden bg-white hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1 animate-slide-in-left">
            <div class="bg-gradient-to-r from-green-500 to-green-600 px-6 py-3">
                <div class="flex justify-between items-center">
                    <h5 class="text-white font-medium flex items-center">
                        <i class="fas fa-chart-area me-2"></i>点赞量情感趋势
                    </h5>
                    <button class="export-btn bg-white/20 hover:bg-white/30 text-white px-3 py-1 rounded-lg transition-all duration-300 text-sm" data-chart="areaChart">
                        <i class="fas fa-download"></i>
                    </button>
                </div>
            </div>
            <div class="p-4">
                <div id="likesAreaChart" style="height: 400px;"></div>
            </div>
        </div>
    </div>

    <!-- 数据洞察 -->
    <div class="bg-white rounded-xl shadow-lg overflow-hidden animate-fade-in">
        <div class="bg-gradient-to-r from-gray-50 to-gray-100 px-6 py-4 border-b border-gray-200">
            <h5 class="text-gray-800 font-semibold flex items-center">
                <i class="fas fa-lightbulb text-yellow-500 me-2"></i>数据洞察
            </h5>
        </div>
        <div class="p-6">
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4" id="insightCards">
                <!-- 动态生成洞察卡片 -->
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const historyId = {{ history.id }};
    
    // 初始化图表
    const tierPieChart = echarts.init(document.getElementById('likesTierPieChart'));
    const tierBarChart = echarts.init(document.getElementById('likesTierBarChart'));
    const scatterChart = echarts.init(document.getElementById('likesScatterChart'));
    const areaChart = echarts.init(document.getElementById('likesAreaChart'));
    
    // 加载点赞量情感数据
    fetch(`/visualization/api/likes_sentiment/${historyId}`)
        .then(response => response.json())
        .then(data => {
            const tierStats = data.tier_stats;
            const scatterData = data.scatter_data;
            const thresholds = data.thresholds;
            
            // 1. 分层饼图 - 显示各层级的总体分布
            const tierNames = ['低点赞量',  '高点赞量'];
            const tierKeys = ['low',  'high'];
            const tierColors = ['#ffc107',  '#28a745'];
            
            const pieData = tierKeys.map((key, index) => ({
                value: tierStats[key].total,
                name: tierNames[index],
                itemStyle: { color: tierColors[index] }
            }));
            
            const pieOption = {
                tooltip: {
                    trigger: 'item',
                    formatter: '{a} <br/>{b}: {c} ({d}%)'
                },
                legend: {
                    orient: 'vertical',
                    left: 'left'
                },
                series: [{
                    name: '点赞量分层',
                    type: 'pie',
                    radius: ['40%', '70%'],
                    avoidLabelOverlap: false,
                    data: pieData,
                    emphasis: {
                        itemStyle: {
                            shadowBlur: 10,
                            shadowOffsetX: 0,
                            shadowColor: 'rgba(0, 0, 0, 0.5)'
                        }
                    }
                }]
            };
            tierPieChart.setOption(pieOption);
            
            // 2. 层级对比柱状图
            const barOption = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: {
                        type: 'shadow'
                    }
                },
                legend: {
                    data: ['正面评论', '负面评论']
                },
                xAxis: {
                    type: 'category',
                    data: tierNames
                },
                yAxis: {
                    type: 'value'
                },
                series: [
                    {
                        name: '正面评论',
                        type: 'bar',
                        data: tierKeys.map(key => tierStats[key].positive),
                        itemStyle: { color: '#28a745' }
                    },
                    {
                        name: '负面评论',
                        type: 'bar',
                        data: tierKeys.map(key => tierStats[key].negative),
                        itemStyle: { color: '#dc3545' }
                    }
                ]
            };
            tierBarChart.setOption(barOption);
            
            // 3. 散点图 - 点赞量与情感得分关系
            const scatterOption = {
                tooltip: {
                    trigger: 'item',
                    formatter: function(params) {
                        return `点赞量: ${params.value[0]}<br/>情感得分: ${params.value[1].toFixed(3)}`;
                    }
                },
                legend: {
                    data: ['正面评论', '负面评论']
                },
                xAxis: {
                    type: 'value',
                    name: '点赞量',
                    nameLocation: 'middle',
                    nameGap: 30
                },
                yAxis: {
                    type: 'value',
                    name: '情感得分',
                    nameLocation: 'middle',
                    nameGap: 40
                },
                series: [
                    {
                        name: '正面评论',
                        type: 'scatter',
                        data: scatterData.positive,
                        itemStyle: { color: '#28a745' },
                        symbolSize: 8
                    },
                    {
                        name: '负面评论',
                        type: 'scatter',
                        data: scatterData.negative,
                        itemStyle: { color: '#dc3545' },
                        symbolSize: 8
                    }
                ]
            };
            scatterChart.setOption(scatterOption);
            
            // 4. 面积图 - 点赞量区间的情感趋势
            const likesRanges = ['0-' + thresholds.low, (thresholds.low+1) + '-' + thresholds.high, (thresholds.high+1) + '+'];
            const areaOption = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: {
                        type: 'cross'
                    }
                },
                legend: {
                    data: ['正面比例', '负面比例']
                },
                xAxis: {
                    type: 'category',
                    data: likesRanges
                },
                yAxis: {
                    type: 'value',
                    axisLabel: {
                        formatter: '{value}%'
                    }
                },
                series: [
                    {
                        name: '正面比例',
                        type: 'line',
                        stack: '总量',
                        areaStyle: {},
                        data: tierKeys.map(key => {
                            const stats = tierStats[key];
                            return stats.total > 0 ? (stats.positive / stats.total * 100).toFixed(1) : 0;
                        }),
                        itemStyle: { color: '#28a745' }
                    },
                    {
                        name: '负面比例',
                        type: 'line',
                        stack: '总量',
                        areaStyle: {},
                        data: tierKeys.map(key => {
                            const stats = tierStats[key];
                            return stats.total > 0 ? (stats.negative / stats.total * 100).toFixed(1) : 0;
                        }),
                        itemStyle: { color: '#dc3545' }
                    }
                ]
            };
            areaChart.setOption(areaOption);
            
            // 生成数据洞察
            generateInsights(tierStats, thresholds);
        })
        .catch(error => {
            console.error('加载点赞量数据失败:', error);
        });
    
    // 生成数据洞察
    function generateInsights(tierStats, thresholds) {
        const insights = [];
        
        // 计算各层级正面率
        const tierKeys = ['low', 'medium', 'high'];
        const tierNames = ['低点赞量', '中等点赞量', '高点赞量'];
        const positiveRates = tierKeys.map(key => {
            const stats = tierStats[key];
            return stats.total > 0 ? (stats.positive / stats.total * 100) : 0;
        });
        
        // 找出最正面的层级
        const maxRateIndex = positiveRates.indexOf(Math.max(...positiveRates));
        if (positiveRates[maxRateIndex] > 0) {
            insights.push({
                icon: 'fas fa-trophy',
                color: 'success',
                title: '最正面层级',
                content: `${tierNames[maxRateIndex]}评论的正面率最高，达到${positiveRates[maxRateIndex].toFixed(1)}%`
            });
        }
        
        // 点赞量与情感关联性分析
        const highPositiveRate = positiveRates[2];
        const lowPositiveRate = positiveRates[0];
        if (highPositiveRate > lowPositiveRate + 10) {
            insights.push({
                icon: 'fas fa-arrow-up',
                color: 'info',
                title: '正相关趋势',
                content: `高点赞量评论比低点赞量评论正面率高${(highPositiveRate - lowPositiveRate).toFixed(1)}个百分点`
            });
        } else if (lowPositiveRate > highPositiveRate + 10) {
            insights.push({
                icon: 'fas fa-arrow-down',
                color: 'warning',
                title: '负相关趋势',
                content: `低点赞量评论比高点赞量评论正面率高${(lowPositiveRate - highPositiveRate).toFixed(1)}个百分点`
            });
        }
        
        // 数据量分布
        const totalComments = tierKeys.reduce((sum, key) => sum + tierStats[key].total, 0);
        if (totalComments > 0) {
            const maxCountIndex = tierKeys.findIndex(key => 
                tierStats[key].total === Math.max(...tierKeys.map(k => tierStats[k].total))
            );
            insights.push({
                icon: 'fas fa-chart-bar',
                color: 'primary',
                title: '数据分布',
                content: `${tierNames[maxCountIndex]}评论数量最多，共${tierStats[tierKeys[maxCountIndex]].total}条，占比${(tierStats[tierKeys[maxCountIndex]].total / totalComments * 100).toFixed(1)}%`
            });
        }
        
        // 渲染洞察卡片 - 使用Tailwind CSS样式
        const insightCards = document.getElementById('insightCards');
        insightCards.innerHTML = insights.map((insight, index) => {
            // 映射Bootstrap颜色到Tailwind颜色
            const colorMap = {
                'success': 'green',
                'info': 'blue',
                'warning': 'yellow',
                'primary': 'indigo'
            };
            const tailwindColor = colorMap[insight.color] || 'blue';
            
            // 为每个卡片添加不同的动画延迟
            const animationDelay = `${index * 150}ms`;
            
            return `
                <div class="bg-white rounded-lg shadow-md p-4 border-l-4" 
                     style="border-color: var(--tw-color-${tailwindColor}-500); 
                            animation: fadeInUp 0.5s ease-out forwards; 
                            animation-delay: ${animationDelay}; 
                            opacity: 0;">
                    <div class="flex flex-col items-center text-center">
                        <i class="${insight.icon} text-2xl mb-2" 
                           style="color: var(--tw-color-${tailwindColor}-500);"></i>
                        <h6 class="font-semibold mb-1 text-gray-800">${insight.title}</h6>
                        <p class="text-sm text-gray-600">${insight.content}</p>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    // 响应式调整
    window.addEventListener('resize', function() {
        tierPieChart.resize();
        tierBarChart.resize();
        scatterChart.resize();
        areaChart.resize();
    });
    
    // 导出图表功能
    document.querySelectorAll('.export-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            const chartName = this.getAttribute('data-chart');
            let chart;
            
            switch(chartName) {
                case 'tierPieChart':
                    chart = tierPieChart;
                    break;
                case 'tierBarChart':
                    chart = tierBarChart;
                    break;
                case 'scatterChart':
                    chart = scatterChart;
                    break;
                case 'areaChart':
                    chart = areaChart;
                    break;
            }
            
            if (chart) {
                try {
                    const chartImg = chart.getDataURL({
                        type: 'png',
                        pixelRatio: 2,
                        backgroundColor: '#fff'
                    });
                    
                    const link = document.createElement('a');
                    link.download = `点赞分析_${chartName}_${new Date().getTime()}.png`;
                    link.href = chartImg;
                    link.click();
                    
                    showToast('图片导出成功！', 'success');
                } catch (error) {
                    console.error('导出失败:', error);
                    showToast('导出失败，请重试', 'error');
                }
            }
        });
    });
    
    // 显示提示消息
    function showToast(message, type = 'info') {
        const toast = document.createElement('div');
        toast.className = `fixed top-4 right-4 px-6 py-3 rounded-lg shadow-lg text-white z-50 transform transition-all duration-300 translate-y-[-100%] opacity-0`;
        const colors = {
            'success': '#28a745',
            'error': '#dc3545',
            'info': '#007bff'
        };
        toast.style.backgroundColor = colors[type] || colors['info'];
        toast.innerHTML = `
            <div class="flex items-center">
                <i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'} mr-2"></i>
                ${message}
            </div>
        `;
        
        document.body.appendChild(toast);
        
        setTimeout(() => {
            toast.classList.remove('translate-y-[-100%]', 'opacity-0');
        }, 10);
        
        setTimeout(() => {
            toast.classList.add('translate-y-[-100%]', 'opacity-0');
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }
});
</script>
{% endblock %}
